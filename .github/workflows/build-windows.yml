name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cross-compile Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc
        run: |
          export PATH=$PATH:$HOME/go/bin
          go build -tags production -trimpath -ldflags="-w -s -H windowsgui" -o bin/FixMyTex.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyTex-windows-amd64
          path: bin/FixMyTex.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: bin/FixMyTex.exe
