name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev gcc

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Linux binary
        run: |
          export PATH=$PATH:$HOME/go/bin
          VERSION=$(git describe --tags --always)
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -tags production -trimpath \
            -ldflags="-w -s -X main.AppVersion=${VERSION}" -o bin/FixMyTex .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyTex-linux-amd64
          path: bin/FixMyTex

  build-windows:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev gcc gcc-mingw-w64

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Windows binary
        run: |
          export PATH=$PATH:$HOME/go/bin
          VERSION=$(git describe --tags --always)
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
            go build -tags production -trimpath \
            -ldflags="-w -s -H windowsgui -X main.AppVersion=${VERSION}" \
            -o bin/FixMyTex.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyTex-windows-amd64
          path: bin/FixMyTex.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: FixMyTex-linux-amd64
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FixMyTex-windows-amd64
          path: dist/

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mv dist/FixMyTex "dist/FixMyTex-${VERSION}-linux-amd64"
          mv dist/FixMyTex.exe "dist/FixMyTex-${VERSION}-windows-amd64.exe"
          chmod +x "dist/FixMyTex-${VERSION}-linux-amd64"

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="0xMMA/FixMyTex"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > dist/latest.json <<EOF
          {
            "version": "${VERSION#v}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/FixMyTex-${VERSION}-linux-amd64",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/FixMyTex-${VERSION}-windows-amd64.exe",
                "signature": ""
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/FixMyTex-${{ steps.version.outputs.VERSION }}-linux-amd64
            dist/FixMyTex-${{ steps.version.outputs.VERSION }}-windows-amd64.exe
            dist/latest.json
